<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css?family=Poppins" rel="stylesheet" />

    <title>Search No Results</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins";
      }
      #search-results-section {
        max-width: 1440px;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
      }
      #search-results-container {
        display: flex;
        flex-direction: column;
        gap: 24px;
        align-items: center;
        text-align: center;
      }
      #search-results-container img {
        width: clamp(80px, 10vw, 140px);
        height: auto;
      }
      .result-text-content {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .search-results-message {
        color: #282727;
        font-size: clamp(16px, 3vw, 20px);
        font-style: normal;
        font-weight: 400;
        line-height: 30px;
      }
      .search-results-description {
        color: #646464;
        font-size: clamp(12px, 3vw, 14px);
        font-style: normal;
        font-weight: 400;
        line-height: normal;
      }
      #suggest-button {
        background: #3f59d9;
        border-radius: 8px;
        justify-content: center;
        padding: 16px 12px;
        border: none;
        color: #fff;
        font-size: 16px;
        font-style: normal;
        font-weight: 600;
        line-height: 24px;
        box-shadow: 0 10px 22px rgba(68, 90, 200, 0.35);
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
      }
      #suggest-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 35px rgba(63, 89, 217, 0.25);
        cursor: pointer;
      }
      /* Modal */
      #suggest-modal {
        position: fixed;
        inset: 0;
        display: flex;
        visibility: hidden;
        align-items: flex-end;
        justify-content: center;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        opacity: 0;
        transition:
          opacity 0.4s ease-out,
          visibility 0.4s ease-out;
      }
      .modal-content {
        display: flex;
        flex-direction: column;
        position: relative;
        width: 100%;
        border-radius: 16px 16px 0 0;
        padding: 36px 16px 19px;
        background: linear-gradient(59deg, var(--Green-30, #a8ffe2) 22.94%, var(--Blue-30, #a4deff) 92.11%);
        transform: translateY(100%);
        transition: transform 0.4s ease-out;
        /* transition:
          transform 0.3s ease-out,
          opacity 0.3s ease-out; */
        /* animation: modalSlideUp 0.3s ease-out; */
        /* opacity: 1; */
        gap: 20px;
        align-items: center;
        text-align: center;
        overflow: hidden;
        max-height: 70vh;
        /* overflow-y: auto; */
        /* transition: transform 0.5s ease-out; */
      }
      #suggest-modal.show {
        opacity: 1;
        visibility: visible;
      }

      #suggest-modal.show .modal-content {
        /* animation: modalSlideUp 0.3s ease-out forwards; */
        transform: translateY(0);
        /* opacity: 1; */
      }

      /* Fade out as the modal is dragged */
      /* #suggest-modal.fade-out .modal-content {
        opacity: 0.2;
        transform: translateY(100%); /* Move modal down when fading
      } */
      .sticker {
        position: absolute;
        pointer-events: none;
        z-index: 0;
      }
      .sticker-left {
        top: 77px;
        left: -45px;
        transform: rotate(-2deg);
      }
      .sticker-right {
        top: 85px;
        right: -45px;
        transform: rotate(-1deg);
      }
      .modal-header {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .modal-content > svg {
        position: absolute;
        top: 12px;
        right: 12px;
        cursor: pointer;
      }
      .card-title {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .card-title h2 {
        color: #282727;
        font-size: 20px;
        font-style: normal;
        font-weight: 600;
        line-height: 30px;
      }
      .card-description {
        color: #282727;
        font-size: clamp(14px, 3vw, 16px);
        font-style: normal;
        font-weight: 400;
        line-height: 20px;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 12px;
        border: 1px solid #27e2a4;
        border-radius: 24px;
        background: rgba(249, 249, 249, 0.85);
        backdrop-filter: blur(20px);
        padding: 20px;
        width: 100%;
        height: auto;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      label {
        text-align: start;
        font-size: clamp(12px, 3vw, 14px);
        font-style: normal;
        font-weight: 400;
        line-height: 20px;
        color: #282727;
        opacity: 0.6;
        gap: 12px;
      }
      .form-control,
      .input-textarea {
        display: flex;
        align-items: flex-start;
        border: 1px solid #dadce0;
        border-radius: 12px;
        background: #fff;
        padding: 12px 16px;
        width: 100%;
      }
      .input-textarea {
        resize: none;
        min-height: 116px;
      }
      .modal-button {
        border: none;
        border-radius: 8px;
        background: #3f59d9;
        padding: 16px 12px;
        color: #fff;
        gap: 16px;
        font-size: 16px;
        font-style: normal;
        font-weight: 600;
        line-height: 24px;
        box-shadow: 0 10px 22px rgba(68, 90, 200, 0.35);
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
      }
      .modal-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 35px rgba(63, 89, 217, 0.25);
        cursor: pointer;
      }

      @media (width >= 768px) {
        /* In modal */
        #suggest-modal {
          position: fixed;
          inset: 0;
          display: none;
          align-items: center;
          justify-content: center;
          background: rgba(0, 0, 0, 0.5);
          z-index: 1000;
          animation: modalFade 0.3s ease;
        }
        #suggest-modal.show {
          display: flex;
        }
        .modal-content {
          padding: 36px 27px 55px;
          border-radius: 16px;
          max-width: 484px;
          width: 100%;
          max-height: none;
          overflow-y: visible;
          animation: modalFade 0.3s ease;
        }
        .sticker-left {
          top: 80px;
          left: -1px;
          transform: rotate(-2deg);
        }
        .sticker-right {
          top: 85px;
          right: -2px;
          transform: rotate(-1deg);
        }
      }
      /* KEYFRAMES DITOH */
      @keyframes modalFade {
        from {
          transform: translateY(0);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      /* @keyframes modalSlideUp {
        0% {
          transform: translateY(100%);
        }
        100% {
          transform: translateY(0);
        }
      } */
    </style>
  </head>
  <body>
    <main>
      <section id="search-results-section">
        <div id="search-results-container">
          <img src="img/eye-curious-sticker2.png" alt="eye-sticker" />
          <div class="result-text-content">
            <h1 class="search-results-message">Can't find it...</h1>
            <p class="search-results-description">
              Looks like we don’t have “<span>Search of the user</span>” (yet).<br />Tell us what you’re looking for and
              we’ll try to bring it in.
            </p>
          </div>
          <button type="button" id="suggest-button">Suggest a Product</button>
        </div>
      </section>
      <!-- Modal toh -->
      <div id="suggest-modal" class="modal">
        <div class="modal-content">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path
              d="M10.25 11.3679L6.33745 15.2804C6.19106 15.4268 6.00475 15.5 5.77852 15.5C5.55228 15.5 5.36597 15.4268 5.21958 15.2804C5.07319 15.134 5 14.9477 5 14.7215C5 14.4952 5.07319 14.3089 5.21958 14.1625L9.13213 10.25L5.21958 6.33745C5.07319 6.19106 5 6.00475 5 5.77852C5 5.55228 5.07319 5.36597 5.21958 5.21958C5.36597 5.07319 5.55228 5 5.77852 5C6.00475 5 6.19106 5.07319 6.33745 5.21958L10.25 9.13213L14.1625 5.21958C14.3089 5.07319 14.4952 5 14.7215 5C14.9477 5 15.134 5.07319 15.2804 5.21958C15.4268 5.36597 15.5 5.55228 15.5 5.77852C15.5 6.00475 15.4268 6.19106 15.2804 6.33745L11.3679 10.25L15.2804 14.1625C15.4268 14.3089 15.5 14.4952 15.5 14.7215C15.5 14.9477 15.4268 15.134 15.2804 15.2804C15.134 15.4268 14.9477 15.5 14.7215 15.5C14.4952 15.5 14.3089 15.4268 14.1625 15.2804L10.25 11.3679Z"
              fill="#646464"
            />
          </svg>
          <img src="img/message-sticker-left.png" alt="chat-sticker" class="sticker sticker-left" />
          <img src="img/message-sticker-right.png" alt="chat-sticker" class="sticker sticker-right" />
          <div class="modal-header">
            <div class="card-title">
              <h2>Got Something in Mind?</h2>
              <svg xmlns="http://www.w3.org/2000/svg" width="244" height="9" viewBox="0 0 244 9" fill="none">
                <path
                  d="M1.5 5.7842C32.8034 2.18078 64.8379 1.608 96.4481 1.50556C145.381 1.34697 193.808 4.61317 242.5 7.5"
                  stroke="#3F59D9"
                  stroke-width="3"
                  stroke-linecap="round"
                />
              </svg>
            </div>
            <p class="card-description">
              We love hearing from the people who make <br />
              ABZ what it is.
            </p>
          </div>
          <form action="/" method="post">
            <div class="form-group">
              <label for="name">What do we call you?</label>
              <input type="text" id="name" name="name" placeholder="Name" class="form-control" required />
            </div>
            <div class="form-group">
              <label for="email">Where can we contact you?</label>
              <input type="email" id="email" name="email" placeholder="Email" class="form-control" required />
            </div>
            <div class="form-group">
              <label for="product-name">What are you looking from ABZ?</label>
              <input
                type="text"
                id="product-name"
                name="product-name"
                placeholder="Product Name"
                class="form-control"
                required
              />
            </div>
            <div class="form-group">
              <label for="explanation">Why you love it?</label>
              <textarea
                class="input-textarea"
                name="explanation"
                id="explanation"
                placeholder="Tell us why it deserves a spot in the shop"
              ></textarea>
            </div>
            <button type="submit" class="modal-button">Send Suggestions</button>
          </form>
        </div>
      </div>
    </main>
  </body>
  <script>
    const modal = document.getElementById("suggest-modal");
    const modalContent = document.querySelector(".modal-content");
    const openBtn = document.getElementById("suggest-button");
    const closeBtn = document.querySelector(".modal-content > svg");

    let isDragging = false;
    let startY = 0;
    let currentY = 0;
    let currentTranslateY = 0; // tracks current position

    const SNAP_FULL = window.innerHeight * 0.05; // max drag up limit

    openBtn.addEventListener("click", () => {
      if (isMobile) {
        modal.style.opacity = "";
        modal.style.transition = "";
        modalContent.style.transform = "";
        modalContent.style.transition = "";
        currentTranslateY = 0;
      }
      modal.classList.add("show");
      document.body.style.overflow = "hidden";
    });

    function closeModal(slide = false) {
      if (slide) {
        modalContent.style.transition = "transform 0.4s ease-out";
        modalContent.style.transform = "translateY(100%)";
        modal.style.transition = "opacity 0.4s ease-out";
        modal.style.opacity = "0";
      }

      setTimeout(
        () => {
          modal.classList.remove("show");
          modal.style.cssText = "";
          modalContent.style.cssText = "";
          document.body.style.overflow = "auto";
        },
        slide ? 400 : 0,
      );
    }

    closeBtn.addEventListener("click", () => closeModal());

    const isMobile = window.matchMedia("(max-width: 768px)").matches;

    if (isMobile) {
      modalContent.addEventListener("touchstart", (e) => {
        isDragging = true;
        startY = e.touches[0].clientY;
        modalContent.style.transition = "none";
      });

      modalContent.addEventListener("touchmove", (e) => {
        if (!isDragging) return;

        currentY = e.touches[0].clientY;
        const dragDistance = currentY - startY;
        const newTranslate = currentTranslateY + dragDistance;

        // Stop dragging up past the limit
        if (newTranslate < SNAP_FULL) return;

        modalContent.style.transform = `translateY(${newTranslate}px)`;

        // Only fade when dragging down
        if (newTranslate > 0) {
          const opacity = 1 - newTranslate / window.innerHeight;
          modal.style.opacity = Math.max(opacity, 0);
        } else {
          modal.style.opacity = "1";
        }
      });

      modalContent.addEventListener("touchend", () => {
        if (!isDragging) return;
        isDragging = false;

        modalContent.style.transition = "transform 0.4s ease-out";
        const dragDistance = currentY - startY;

        if (dragDistance > window.innerHeight / 4) {
          // Dragged down far enough → close
          closeModal(true);
        } else if (dragDistance < -80) {
          // Dragged up enough → snap to full
          currentTranslateY = SNAP_FULL;
          modalContent.style.transform = `translateY(${SNAP_FULL}px)`;
          modal.style.opacity = "1";
        } else {
          // Snap back to original position
          currentTranslateY = 0;
          modalContent.style.transform = `translateY(${currentTranslateY}px)`;
          modal.style.opacity = "1";
        }
      });
    }

    modal.addEventListener("click", (e) => {
      if (e.target === modal) closeModal();
    });
  </script>
</html>
